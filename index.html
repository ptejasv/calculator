<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script defer src="./scripts/calculator.js"></script>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <div class="calc-body">
        <div class="display">
            <p></p>
        </div>
        <div class="calc-buttons">
            <button id="buttonAC" class="btn-op">CLEAR</button>
            <button id="buttonDivide" class="btn-op">&#247</button>
            <button class="btn-digit">7</button>
            <button class="btn-digit">8</button>
            <button class="btn-digit">9</button>
            <button id="buttonTimes" class="btn-op">&#215;</button>
            <button class="btn-digit">4</button>
            <button class="btn-digit">5</button>
            <button class="btn-digit">6</button>
            <button id="buttonMinus" class="btn-op">-</button>
            <button class="btn-digit">1</button>
            <button class="btn-digit">2</button>
            <button class="btn-digit">3</button>
            <button id="buttonPlus" class="btn-op">+</button>
            <button class="btn-digit">0</button>
            <button id="buttonDot" class="btn-digit">.</button>
            <button id="buttonEquals" class="btn-op">=</button>
        </div>
    </div>
</body>
</html>
