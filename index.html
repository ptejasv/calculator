<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script defer src="./scripts/calculator.js"></script>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <div class="calc-body">
        <div class="display">
            <p>12345</p>
        </div>
        <div class="calc-buttons">
            <button id="buttonAC" class="btn-op">CLEAR</button>
            <button id="buttonDivide" class="btn-op">&#247</button>
            <button id="button7">7</button>
            <button id="button8">8</button>
            <button id="button9">9</button>
            <button id="buttonTimes" class="btn-op">&#215;</button>
            <button id="button4">4</button>
            <button id="button5">5</button>
            <button id="button6">6</button>
            <button id="buttonMinus" class="btn-op">-</button>
            <button id="button1">1</button>
            <button id="button2">2</button>
            <button id="button3">3</button>
            <button id="buttonbuttonlus" class="btn-op">+</button>
            <button id="button0">0</button>
            <button id="buttonDot">.</button>
            <button id="buttonEquals" class="btn-op">=</button>
        </div>
    </div>
</body>
</html>
